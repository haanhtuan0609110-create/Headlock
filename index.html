<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Headlock UI</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle, #0b0b1a, #000);
  color: white;
  text-align: center;
}

h1 { margin-top: 20px; }

.card {
  width: 90%;
  max-width: 400px;
  margin: 20px auto;
  padding: 20px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
}

.select-box {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

.option {
  flex: 1;
  padding: 20px;
  border-radius: 15px;
  background: rgba(255,255,255,0.1);
  cursor: pointer;
  transition: 0.3s;
}

.option:hover {
  background: #3aa0ff;
}

.success {
  margin-top: 15px;
  padding: 12px;
  background: white;
  color: black;
  border-radius: 10px;
  display: none;
}

.btn-off {
  margin-top: 10px;
  padding: 12px;
  background: white;
  color: red;
  border-radius: 10px;
  display: none;
  cursor: pointer;
}
</style>
</head>

<body>

<h1>HEADLOCK</h1>

<div class="card">
  <h3>Chọn phiên bản Free Fire:</h3>

  <div class="select-box">
    <div class="option" onclick="runFF('normal')">🔥 Free Fire</div>
    <div class="option" onclick="runFF('max')">⚡ Free Fire Max</div>
  </div>

  <div id="success" class="success">
    ✔ HeadLock Was Successful!
  </div>

  <div id="off" class="btn-off" onclick="turnOff()">
    ✖ Turn off HeadLock
  </div>
</div>

<script>
function runFF(type) {
  document.getElementById("success").style.display = "block";
  document.getElementById("off").style.display = "block";

  // giả lập delay giống app
  setTimeout(() => {
    if (type === "normal") {
      // thử mở game (nếu có)
      window.location.href = "freefire://";
    } else {
      window.location.href = "freefiremax://";
    }

    // fallback nếu không mở được → chuyển sang web
    setTimeout(() => {
      window.location.href = "https://ff.garena.com/";
    }, 2000);

  }, 1500);
}

function turnOff() {
  document.getElementById("success").style.display = "none";
  document.getElementById("off").style.display = "none";
}
</script>

</body>
</html>
